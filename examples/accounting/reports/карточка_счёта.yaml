name: КарточкаСчёта
title: Карточка счёта
params:
  - name: Счёт
    type: string
    label: "Счёт"
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    period КАК Дата,
    регистратор_тип КАК Документ,
    СчётДт,
    СчётКт,
    Сумма
  ИЗ РегистрБухгалтерии.БухУчёт
  ГДЕ (СчётДт = &Счёт ИЛИ СчётКт = &Счёт)
    И period >= &Начало
    И period <= &Конец
  УПОРЯДОЧИТЬ ПО period
