name: ЖурналОпераций
title: Журнал проводок
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
  - name: Счёт
    type: string
    label: "Счёт (пусто — все)"
query: |
  ВЫБРАТЬ
    period КАК Дата,
    регистратор_тип КАК Документ,
    СчётДт,
    СчётКт,
    Сумма
  ИЗ РегистрБухгалтерии.БухУчёт
  ГДЕ (&Счёт ЕСТЬ ПУСТО ИЛИ СчётДт = &Счёт ИЛИ СчётКт = &Счёт)
    И period >= &Начало
    И period <= &Конец
  УПОРЯДОЧИТЬ ПО period, регистратор_тип
