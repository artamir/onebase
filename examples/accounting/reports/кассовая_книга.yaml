name: КассоваяКнига
title: Кассовая книга
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    period КАК Дата,
    регистратор_тип КАК Документ,
    СУММА(ВЫБОР КОГДА СчётДт = '50' ТОГДА Сумма ИНАЧЕ 0 КОНЕЦ) КАК Приход,
    СУММА(ВЫБОР КОГДА СчётКт = '50' ТОГДА Сумма ИНАЧЕ 0 КОНЕЦ) КАК Расход
  ИЗ РегистрБухгалтерии.БухУчёт
  ГДЕ (СчётДт = '50' ИЛИ СчётКт = '50')
    И period >= &Начало
    И period <= &Конец
  СГРУППИРОВАТЬ ПО period, регистратор_тип
  УПОРЯДОЧИТЬ ПО period
