name: ОборотыЗаПериод
title: Обороты за период
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    Счёт,
    Наименование,
    Сумма_Дт КАК ОборотДт,
    Сумма_Кт КАК ОборотКт
  ИЗ РегистрБухгалтерии.БухУчёт.Обороты(&Начало, &Конец)
  УПОРЯДОЧИТЬ ПО Счёт
