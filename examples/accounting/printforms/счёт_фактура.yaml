name: СчётФактура
document: РеализацияТоваров
title: "Счёт-фактура № {{Номер}} от {{Дата | date}}"
header: |
  **Продавец**: {{Организация.Наименование}}

  **Покупатель**: {{Покупатель.Наименование}}
table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура.Наименование
      label: Наименование товара
    - field: Количество
      label: Кол-во
      align: right
    - field: Цена
      label: Цена
      align: right
      format: "number:2"
    - field: Сумма
      label: Стоимость без НДС
      align: right
      format: "number:2"
    - field: СтавкаНДС
      label: Ставка НДС
    - field: НДС
      label: Сумма НДС
      align: right
      format: "number:2"
  totals:
    - field: Сумма
      sum: true
      label: Итого
    - field: НДС
      sum: true
      label: Всего НДС
footer: |
  ___

  **Всего к оплате**: {{СуммаДокумента | money}} руб., в т.ч. НДС: {{НДС | money}} руб.

  ___

  Руководитель: _______________  Главный бухгалтер: _______________
