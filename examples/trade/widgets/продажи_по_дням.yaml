name: ПродажиПоДням
type: chart
chart_kind: bar
title: Продажи за 30 дней
params:
  Начало: "{{today|minus_days:30}}"
query: |
  ВЫБРАТЬ
    Дата,
    СУММА(Сумма) КАК Сумма
  ИЗ Документ.РеализацияТоваров
  ГДЕ Дата >= &Начало
  СГРУППИРОВАТЬ ПО Дата
  УПОРЯДОЧИТЬ ПО Дата
x_field: Дата
y_fields: [Сумма]
