name: ТопНоменклатуры
type: list
title: Топ номенклатуры по выручке (месяц)
limit: 10
params:
  Начало: "{{today|start_of_month}}"
query: |
  ВЫБРАТЬ
    Номенклатура,
    СУММА(Выручка)       КАК Выручка,
    СУММА(Себестоимость) КАК Себестоимость,
    СУММА(Выручка) - СУММА(Себестоимость) КАК Прибыль
  ИЗ РегистрНакопления.ВаловаяПрибыль
  ГДЕ period >= &Начало
  СГРУППИРОВАТЬ ПО Номенклатура
  УПОРЯДОЧИТЬ ПО Выручка УБЫВ
columns:
  - { field: Номенклатура, label: "Номенклатура" }
  - { field: Выручка,       label: "Выручка",  format: money,  align: right }
  - { field: Прибыль,       label: "Прибыль",  format: money,  align: right }
