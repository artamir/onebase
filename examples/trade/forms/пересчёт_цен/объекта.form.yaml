schema: onebase.form/v1
form:
  name: ФормаОбъекта
  kind: object
  entity: ПересчётЦен
  title:
    ru: "Пересчёт цен номенклатуры"

elements:
  - kind: ГруппаФормы
    name: Параметры
    title:
      ru: "Параметры"
    children:
      - kind: ПолеВвода
        name: ПолеПроцент
        title:
          ru: "Процент изменения цены"
        data_path: Объект.Процент
        required: true
        hint: "Положительный — увеличить, отрицательный — уменьшить"

      - kind: ПолеВвода
        name: ПолеГруппа
        title:
          ru: "Группа"
        data_path: Объект.Группа
        hint: "Оставьте пустым для обработки всех товаров"
